<!doctype html>
<html lang="bn">
  <head>
    <meta charset="utf-8" />
    <title>Durud Reminder — নতুন ট্যাব</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      html,
      body {
        width: 100%;
        min-height: 100vh;
      }
      body {
        display: grid;
        place-items: center;
        padding: 40px 20px;
      }
      .nt {
        max-width: 720px;
        width: 100%;
        text-align: center;
      }
      .nt-date {
        color: var(--ink-soft);
        font-size: 13px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 20px;
      }
      .nt-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 40px 36px;
        box-shadow: var(--shadow);
      }
      .nt-name {
        font-family: "Fraunces", serif;
        color: var(--brand);
        font-size: 14px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .nt-arabic {
        font-family: "Amiri Quran", serif;
        font-size: 32px;
        line-height: 2.2;
        direction: rtl;
        margin-bottom: 24px;
      }
      .nt-translit {
        font-family: "Tiro Bangla", serif;
        font-style: italic;
        color: var(--ink-soft);
        font-size: 15px;
        margin-bottom: 14px;
      }
      .nt-bangla {
        font-family: "Tiro Bangla", serif;
        font-size: 16px;
        line-height: 1.7;
      }
      .nt-ref {
        margin-top: 20px;
        color: var(--ink-soft);
        font-size: 12px;
      }
      .nt-quick {
        margin-top: 28px;
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .nt-quick a {
        color: var(--ink-soft);
        text-decoration: none;
        font-size: 13px;
        padding: 8px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        transition: 0.15s;
      }
      .nt-quick a:hover {
        color: var(--brand);
        border-color: var(--brand);
      }
    </style>
  </head>
  <body>
    <div class="nt">
      <div class="nt-date" id="nt-date"></div>
      <div class="nt-card">
        <div class="nt-name" id="nt-name">দুরুদ</div>
        <div class="nt-arabic" id="nt-arabic"></div>
        <div class="nt-translit" id="nt-translit"></div>
        <div class="nt-bangla" id="nt-bangla"></div>
        <div class="nt-ref" id="nt-ref"></div>
      </div>
      <div class="nt-quick">
        <a href="https://www.google.com">Google</a>
        <a href="https://www.youtube.com">YouTube</a>
        <a href="https://mail.google.com">Gmail</a>
        <a href="https://github.com">GitHub</a>
      </div>
    </div>
    <script src="newtab.js"></script>
  </body>
</html>

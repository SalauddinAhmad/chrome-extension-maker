<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Designer OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <!-- ============ HEADER ============ -->
      <header class="hdr">
        <div class="hdr-brand">
          <div class="hdr-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7l8-4 8 4-8 4-8-4z"/>
              <path d="M4 12l8 4 8-4"/>
              <path d="M4 17l8 4 8-4"/>
            </svg>
          </div>
          <div>
            <div class="hdr-title">Designer OS</div>
            <div class="hdr-sub">Creative Workspace · v1.0</div>
          </div>
        </div>
        <div class="hdr-actions">
          <button class="icon-btn" title="Command Palette (⌘K)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
          </button>
          <button class="icon-btn" title="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
            <span class="dot"></span>
          </button>
          <button class="icon-btn" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6h.09A1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <!-- ============ SEARCH ============ -->
      <div class="search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="Search tools, colors, fonts, assets…" />
        <kbd>⌘K</kbd>
      </div>

      <!-- ============ QUICK ACTIONS (this page) ============ -->
      <section class="block">
        <div class="block-head">
          <span class="block-title">This Page</span>
          <span class="block-meta">designer-os.dev</span>
        </div>
        <div class="quick">
          <button class="quick-btn" data-tool="pick">
            <span class="qi" style="--tint:#a78bfa">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2l9 9-9 9-9-9 9-9z"/><path d="M9 6l9 9"/></svg>
            </span>
            <span>Pick Color</span>
          </button>
          <button class="quick-btn" data-tool="font">
            <span class="qi" style="--tint:#f0abfc">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6V4h14v2"/><path d="M12 4v16"/><path d="M9 20h6"/></svg>
            </span>
            <span>Font</span>
          </button>
          <button class="quick-btn" data-tool="inspect">
            <span class="qi" style="--tint:#7dd3fc">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
            </span>
            <span>Inspect</span>
          </button>
          <button class="quick-btn" data-tool="shot">
            <span class="qi" style="--tint:#fda4af">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h4l2-3h6l2 3h4v13H3z"/><circle cx="12" cy="13" r="4"/></svg>
            </span>
            <span>Capture</span>
          </button>
          <button class="quick-btn" data-tool="save">
            <span class="qi" style="--tint:#fcd34d">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </span>
            <span>Save</span>
          </button>
        </div>
      </section>

      <!-- ============ TAB BAR ============ -->
      <nav class="tabs">
        <button class="tab is-active" data-tab="studio">Studio</button>
        <button class="tab" data-tab="library">Library</button>
        <button class="tab" data-tab="workspace">Workspace</button>
        <button class="tab" data-tab="utility">Utility</button>
      </nav>

      <!-- ============ MODULE GRID ============ -->
      <main class="modules">
        <!-- STUDIO -->
        <section class="pane is-active" data-pane="studio">
          <div class="mod-grid">
            <button class="mod" data-mod="color">
              <span class="mod-icon" style="--tint:#7c3aed;--tint-2:#a78bfa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="8" cy="10" r="1.3" fill="currentColor"/><circle cx="12" cy="7" r="1.3" fill="currentColor"/><circle cx="16" cy="10" r="1.3" fill="currentColor"/><circle cx="15" cy="15" r="1.3" fill="currentColor"/></svg>
              </span>
              <span class="mod-title">Color Studio</span>
              <span class="mod-sub">Picker · palette · gradient</span>
            </button>
            <button class="mod" data-mod="typo">
              <span class="mod-icon" style="--tint:#db2777;--tint-2:#f472b6">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6V4h14v2"/><path d="M12 4v16"/><path d="M9 20h6"/></svg>
              </span>
              <span class="mod-title">Typography</span>
              <span class="mod-sub">Detect · pair · scale</span>
            </button>
            <button class="mod" data-mod="layout">
              <span class="mod-icon" style="--tint:#0284c7;--tint-2:#38bdf8">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              </span>
              <span class="mod-title">Layout &amp; Grid</span>
              <span class="mod-sub">Overlay · ruler · guides</span>
            </button>
            <button class="mod" data-mod="inspector">
              <span class="mod-icon" style="--tint:#059669;--tint-2:#34d399">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
              </span>
              <span class="mod-title">Site Inspector</span>
              <span class="mod-sub">Full design DNA</span>
            </button>
            <button class="mod" data-mod="tech">
              <span class="mod-icon" style="--tint:#0e7490;--tint-2:#22d3ee">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>
              </span>
              <span class="mod-title">Tech Stack</span>
              <span class="mod-sub">Framework · CMS · CDN</span>
            </button>
            <button class="mod" data-mod="screenshot">
              <span class="mod-icon" style="--tint:#c026d3;--tint-2:#e879f9">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h4l2-3h6l2 3h4v13H3z"/><circle cx="12" cy="13" r="4"/></svg>
              </span>
              <span class="mod-title">Screenshot</span>
              <span class="mod-sub">Full · area · mockup</span>
            </button>
          </div>
        </section>

        <!-- LIBRARY -->
        <section class="pane" data-pane="library">
          <div class="mod-grid">
            <button class="mod" data-mod="assets">
              <span class="mod-icon" style="--tint:#e11d48;--tint-2:#fb7185">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="1.5"/><path d="M21 15l-5-5-8 8"/></svg>
              </span>
              <span class="mod-title">Asset Manager</span>
              <span class="mod-sub">Images · SVG · logos</span>
            </button>
            <button class="mod" data-mod="icons">
              <span class="mod-icon" style="--tint:#7c3aed;--tint-2:#a78bfa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 8 22 9 17 14 18 21 12 18 6 21 7 14 2 9 9 8 12 2"/></svg>
              </span>
              <span class="mod-title">Icon Library</span>
              <span class="mod-sub">10k+ icons · SVG export</span>
            </button>
            <button class="mod" data-mod="fonts">
              <span class="mod-icon" style="--tint:#b45309;--tint-2:#fbbf24">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l6-16 6 16"/><path d="M6 14h8"/><path d="M18 20V8"/></svg>
              </span>
              <span class="mod-title">Font Library</span>
              <span class="mod-sub">Google · custom · pairs</span>
            </button>
            <button class="mod" data-mod="illus">
              <span class="mod-icon" style="--tint:#16a34a;--tint-2:#4ade80">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C7 8 4 12 4 16a8 8 0 0 0 16 0c0-4-3-8-8-14z"/></svg>
              </span>
              <span class="mod-title">Illustrations</span>
              <span class="mod-sub">Free · unDraw · Storyset</span>
            </button>
            <button class="mod" data-mod="mockups">
              <span class="mod-icon" style="--tint:#0891b2;--tint-2:#22d3ee">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
              </span>
              <span class="mod-title">Mockups</span>
              <span class="mod-sub">Device · print · social</span>
            </button>
            <button class="mod" data-mod="uikits">
              <span class="mod-icon" style="--tint:#4f46e5;--tint-2:#818cf8">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="6" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
              </span>
              <span class="mod-title">UI Kits</span>
              <span class="mod-sub">Ready components</span>
            </button>
          </div>
        </section>

        <!-- WORKSPACE -->
        <section class="pane" data-pane="workspace">
          <div class="mod-grid">
            <button class="mod" data-mod="vault">
              <span class="mod-icon" style="--tint:#d97706;--tint-2:#fbbf24">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 15.8 7.1 18.2l.9-5.5-4-3.9 5.5-.8L12 3z"/></svg>
              </span>
              <span class="mod-title">Inspiration</span>
              <span class="mod-sub">Vault · moodboard</span>
            </button>
            <button class="mod" data-mod="dsm">
              <span class="mod-icon" style="--tint:#0369a1;--tint-2:#38bdf8">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 5v10l-9 5-9-5V7z"/><path d="M12 12l9-5"/><path d="M12 12v10"/><path d="M12 12L3 7"/></svg>
              </span>
              <span class="mod-title">Design System</span>
              <span class="mod-sub">Tokens · export</span>
            </button>
            <button class="mod" data-mod="clients">
              <span class="mod-icon" style="--tint:#be185d;--tint-2:#ec4899">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              </span>
              <span class="mod-title">Clients</span>
              <span class="mod-sub">Projects · brand kits</span>
            </button>
            <button class="mod" data-mod="notes">
              <span class="mod-icon" style="--tint:#65a30d;--tint-2:#a3e635">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </span>
              <span class="mod-title">Notes</span>
              <span class="mod-sub">Ideas · briefs · todos</span>
            </button>
            <button class="mod" data-mod="learn">
              <span class="mod-icon" style="--tint:#6d28d9;--tint-2:#a78bfa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
              </span>
              <span class="mod-title">Learning Hub</span>
              <span class="mod-sub">Tutorials · resources</span>
            </button>
            <button class="mod" data-mod="dashboard">
              <span class="mod-icon" style="--tint:#0f766e;--tint-2:#2dd4bf">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
              </span>
              <span class="mod-title">Dashboard</span>
              <span class="mod-sub">Activity · favorites</span>
            </button>
          </div>
        </section>

        <!-- UTILITY -->
        <section class="pane" data-pane="utility">
          <div class="mod-grid">
            <button class="mod" data-mod="compress">
              <span class="mod-icon" style="--tint:#0891b2;--tint-2:#22d3ee">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
              </span>
              <span class="mod-title">Compressor</span>
              <span class="mod-sub">Image · SVG optimize</span>
            </button>
            <button class="mod" data-mod="convert">
              <span class="mod-icon" style="--tint:#7c3aed;--tint-2:#a78bfa">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3l4 4-4 4"/><path d="M3 7h18"/><path d="M7 21l-4-4 4-4"/><path d="M21 17H3"/></svg>
              </span>
              <span class="mod-title">Converter</span>
              <span class="mod-sub">PNG · WebP · SVG</span>
            </button>
            <button class="mod" data-mod="gradient">
              <span class="mod-icon" style="--tint:#e11d48;--tint-2:#fb7185">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12a9 9 0 0 1 18 0"/></svg>
              </span>
              <span class="mod-title">Gradient</span>
              <span class="mod-sub">Generator · mesh</span>
            </button>
            <button class="mod" data-mod="shadow">
              <span class="mod-icon" style="--tint:#334155;--tint-2:#64748b">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="12" height="12" rx="2"/><path d="M20 8v12H8"/></svg>
              </span>
              <span class="mod-title">Shadow</span>
              <span class="mod-sub">Box · text · CSS</span>
            </button>
            <button class="mod" data-mod="contrast">
              <span class="mod-icon" style="--tint:#f59e0b;--tint-2:#fbbf24">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18"/><path d="M12 3a9 9 0 0 1 0 18"/></svg>
              </span>
              <span class="mod-title">Contrast</span>
              <span class="mod-sub">WCAG · a11y check</span>
            </button>
            <button class="mod" data-mod="ruler">
              <span class="mod-icon" style="--tint:#16a34a;--tint-2:#4ade80">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 3L3 21"/><path d="M8 4l2 2"/><path d="M12 4l4 4"/><path d="M4 8l2 2"/><path d="M4 12l4 4"/></svg>
              </span>
              <span class="mod-title">Ruler</span>
              <span class="mod-sub">Measure · spacing</span>
            </button>
          </div>
        </section>
      </main>

      <!-- ============ RECENT STRIP ============ -->
      <footer class="recent">
        <div class="recent-row">
          <span class="recent-label">Recent Colors</span>
          <div class="swatches">
            <span class="sw" style="background:#4f46e5" title="#4f46e5"></span>
            <span class="sw" style="background:#a78bfa" title="#a78bfa"></span>
            <span class="sw" style="background:#f59e0b" title="#f59e0b"></span>
            <span class="sw" style="background:#ec4899" title="#ec4899"></span>
            <span class="sw" style="background:#22c55e" title="#22c55e"></span>
            <span class="sw" style="background:#0f172a" title="#0f172a"></span>
            <span class="sw sw-more">+12</span>
          </div>
        </div>
        <div class="recent-row">
          <span class="recent-label">Recent Fonts</span>
          <div class="chips">
            <span class="fchip" style="font-family:'Syne',sans-serif">Syne</span>
            <span class="fchip" style="font-family:'Plus Jakarta Sans',sans-serif">Jakarta</span>
            <span class="fchip">Inter</span>
          </div>
        </div>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>

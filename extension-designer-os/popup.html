<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Designer OS</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <!-- Header -->
      <header class="hdr">
        <div class="hdr-brand">
          <div class="hdr-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="8" height="8" rx="2"/>
              <rect x="13" y="3" width="8" height="8" rx="2"/>
              <rect x="3" y="13" width="8" height="8" rx="2"/>
              <rect x="13" y="13" width="8" height="8" rx="2"/>
            </svg>
          </div>
          <div class="hdr-text">
            <div class="hdr-title">Designer OS</div>
            <div class="hdr-sub">Creative Workspace</div>
          </div>
        </div>
        <div class="hdr-actions">
          <button class="icon-btn" title="Home" data-nav="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
          </button>
          <button class="icon-btn" title="Command palette" data-nav="cmd">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6v6H9z"/></svg>
          </button>
          <button class="icon-btn" title="Settings" data-nav="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c0 .69.4 1.31 1 1.51H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <!-- Tab bar -->
      <nav class="tabs">
        <button class="tab is-active" data-tab="tools">Tools</button>
        <button class="tab" data-tab="saved">Saved</button>
        <button class="tab" data-tab="recent">Recent</button>
        <button class="tab" data-tab="resources">Resources</button>
      </nav>

      <!-- Tool list -->
      <main class="list">
        <button class="row" data-tool="color">
          <span class="row-icon" style="--tint:#ede9fe;color:#6d28d9">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="8" cy="10" r="1.2" fill="currentColor"/><circle cx="12" cy="7" r="1.2" fill="currentColor"/><circle cx="16" cy="10" r="1.2" fill="currentColor"/><circle cx="15" cy="15" r="1.2" fill="currentColor"/></svg>
          </span>
          <span class="row-text">
            <span class="row-title">Color Studio</span>
            <span class="row-sub">Pick any color from page</span>
          </span>
          <span class="row-ctrl">
            <span class="chip">HEX</span>
          </span>
        </button>

        <button class="row" data-tool="font">
          <span class="row-icon" style="--tint:#e0e7ff;color:#4338ca">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6V4h14v2"/><path d="M12 4v16"/><path d="M9 20h6"/></svg>
          </span>
          <span class="row-text">
            <span class="row-title">Typography</span>
            <span class="row-sub">Hover to detect font details</span>
          </span>
          <span class="row-ctrl">
            <span class="toggle" role="switch" aria-checked="false"><span class="thumb"></span></span>
          </span>
        </button>

        <button class="row" data-tool="inspector">
          <span class="row-icon" style="--tint:#dcfce7;color:#15803d">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
          </span>
          <span class="row-text">
            <span class="row-title">Design Inspector</span>
            <span class="row-sub">Extract full design DNA</span>
          </span>
          <span class="row-ctrl"><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg></span>
        </button>

        <button class="row" data-tool="vault">
          <span class="row-icon" style="--tint:#fef3c7;color:#b45309">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 15.8 7.1 18.2l.9-5.5-4-3.9 5.5-.8L12 3z"/></svg>
          </span>
          <span class="row-text">
            <span class="row-title">Inspiration Vault</span>
            <span class="row-sub">Save current page & note</span>
          </span>
          <span class="row-ctrl"><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg></span>
        </button>

        <button class="row" data-tool="assets">
          <span class="row-icon" style="--tint:#ffe4e6;color:#be123c">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="1.5"/><path d="M21 15l-5-5-8 8"/></svg>
          </span>
          <span class="row-text">
            <span class="row-title">Asset Extractor</span>
            <span class="row-sub">Images, SVGs, icons, logos</span>
          </span>
          <span class="row-ctrl"><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg></span>
        </button>

        <button class="row" data-tool="tech">
          <span class="row-icon" style="--tint:#cffafe;color:#0e7490">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>
          </span>
          <span class="row-text">
            <span class="row-title">Tech Stack</span>
            <span class="row-sub">Detect framework, CMS, CDN</span>
          </span>
          <span class="row-ctrl"><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg></span>
        </button>

        <button class="row" data-tool="screenshot">
          <span class="row-icon" style="--tint:#f3e8ff;color:#7e22ce">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h4l2-3h6l2 3h4v13H3z"/><circle cx="12" cy="13" r="4"/></svg>
          </span>
          <span class="row-text">
            <span class="row-title">Screenshot Studio</span>
            <span class="row-sub">Capture & annotate</span>
          </span>
          <span class="row-ctrl"><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg></span>
        </button>
      </main>

      <!-- Recent colors -->
      <footer class="recent">
        <span class="recent-pill">Recent Colors</span>
        <div class="swatches">
          <span class="sw" style="background:#4f46e5" title="#4f46e5"></span>
          <span class="sw" style="background:#f59e0b" title="#f59e0b"></span>
          <span class="sw" style="background:#f8fafc;border:1px solid #e2e8f0" title="#f8fafc"></span>
          <span class="sw" style="background:#2563eb" title="#2563eb"></span>
          <span class="sw" style="background:#dc2626" title="#dc2626"></span>
          <span class="sw" style="background:#0f172a" title="#0f172a"></span>
          <span class="sw" style="background:#22c55e" title="#22c55e"></span>
        </div>
        <button class="clear">Clear</button>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
